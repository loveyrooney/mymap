spring:
  application:
    name: mymap
  datasource:
    url: jdbc:postgresql://localhost:5432/mymap
    username: postgres
    password: "1234"
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      max-lifetime: 5000
      idle-timeout: 2000
      minimum-idle: 2
      connection-timeout: 20000
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
  thymeleaf:
    cache: false
  data:
    web:
      pageable:
        default-page-size: 10
        one-indexed-parameters: true

server:
  port: 8080
  servlet:
    encoding:
      charset: utf-8
      enabled: true
      force: true

logging:
  level:
    sql: debug
    org.hibernate.type: trace
    com.mymap: info

jwt:
  public-key: 
  private-key: 

